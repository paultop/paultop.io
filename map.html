<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Professional Journey | Paul Thompson</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #666666;
            --text: #111111;
            --pulse-color: rgba(63, 177, 206, 0.7);
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Pulsing Marker for pins WITH photos */
        .pulse-marker {
            width: 15px;
            height: 15px;
            background: #3FB1CE;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 rgba(63, 177, 206, 0.4);
            animation: pulse 2s infinite;
            border: 2px solid white;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--pulse-color); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(63, 177, 206, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(63, 177, 206, 0); }
        }

        /* Standard Popup Styles */
        .mapboxgl-popup-content {
            max-width: 280px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h3 { margin: 0 0 8px 0; font-size: 1.1rem; font-weight: 800; color: var(--text); }
        .popup-img { width: 100%; height: auto; border-radius: 6px; margin-top: 8px; border: 1px solid #eee; }
        .popup-desc { font-size: 0.9rem; color: var(--accent); margin-top: 12px; line-height: 1.5; font-style: italic; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGF1bHRvcCIsImEiOiJjbXA0bHI4M2QwYjZtMnlvbHpkdHl3cW5zIn0.vhAhlNS5-wtjkNsboEPnMA';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        projection: 'globe',
        zoom: 1.8,
        center: [135, -15] 
    });

    const locations = [
        { name: "Sydney, Australia", coords: [151.2093, -33.8688], img: "images/sydney.jpg", description: "The 7-year home base for APAC expansion." },
        { name: "Bondi Beach, Australia", coords: [151.2743, -33.8915], img: "images/wedding.jpeg", description: "Established regional presence and a major life milestone." },
        { name: "San Francisco", coords: [-122.4194, 37.7749], img: "images/sf.jpg", description: "Current chapter: Tech GTM in the heart of AI." },
        { name: "Oak Park/Chicago", coords: [-87.7845, 41.8850], img: "images/chicago.jpg", description: "Hometown and roots." }
    ]; 

    map.on('style.load', () => {
        map.setFog({
            color: 'rgb(186, 210, 247)',
            'high-color': 'rgb(36, 92, 223)',
            'horizon-blend': 0.02,
            'space-color': 'rgb(11, 11, 25)',
            'star-intensity': 0.6
        });

        locations.forEach(loc => {
            let marker;
            
            const popupContent = `
                <h3>${loc.name}</h3>
                ${loc.img ? `<img src="${loc.img}" class="popup-img" onerror="this.style.display='none'">` : ''}
                ${loc.description ? `<p class="popup-desc">${loc.description}</p>` : ''}
            `;

            // THE LOGIC: If there is an image, use the pulse. If not, use static.
            if (loc.img && loc.img !== "") {
                const el = document.createElement('div');
                el.className = 'pulse-marker';
                marker = new mapboxgl.Marker(el);
            } else {
                marker = new mapboxgl.Marker({ color: '#3FB1CE' });
            }

            marker.setLngLat(loc.coords)
                .setPopup(new mapboxgl.Popup({ offset: 25 }).setHTML(popupContent))
                .addTo(map);
        });
    });
</script>
</body>
</html>
